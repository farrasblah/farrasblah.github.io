<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
</head>
<body>
    <div id="app">
        Hasil : {{hasil}} <br>
        <input type="number" v-model="angka1">
        <input type="number" v-model="angka2"><br>
        <div>
            <button @click="hasil=angka1+angka2">+</button>
            <button @click="hasil=angka1-angka2">-</button>
            <button @click="hasil=angka1*angka2">*</button>
            <button @click="hasil=angka1/angka2">/</button>
          </div>
    </div>
      

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    angkaPertama: 0,
                    angkaKedua: 0,
                    hasil: 0,
                }
            }
        })
        app.mount('#app')
      </script>
    
</body>
</html>
